name: Sync Dev.to posts

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync Dev.to posts
        env:
          DEVTO_USERNAME: ${{ vars.DEVTO_USERNAME }}
          # DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}  # uncomment if you want drafts
        run: node scripts/sync-devto.js

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "sync: import posts from dev.to"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.committed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
